events {}

http {
    server {
        listen 5678;

        location / {
            proxy_pass http://n8n:5678;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Conserver ou définir les en-têtes proxy pour n8n
            proxy_set_header X-Forwarded-Host $http_x_forwarded_host;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

            # Reconstruction dynamique de l'Origin attendue par n8n
            # Si la requête passe par le proxy Codespaces, on reconstruit l'origin publique.
            # Sinon, on garde l'origin locale.
            set $origin_host $http_x_forwarded_host;
            if ($origin_host = "") {
                set $origin_host $host;
            }
            
            set $origin_proto $http_x_forwarded_proto;
            if ($origin_proto = "") {
                set $origin_proto $scheme;
            }

            proxy_set_header Origin $origin_proto://$origin_host;

            # Configuration pour le support des WebSockets et SSE
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }
    }
}
